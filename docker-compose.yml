version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: smartinbox-db
    environment:
      POSTGRES_DB: smartinbox
      POSTGRES_USER: smartinbox
      POSTGRES_PASSWORD: smartinbox123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smartinbox-redis
    ports:
      - "6379:6379"

  auth-service:
    build: ./services/auth-service
    container_name: smartinbox-auth
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://smartinbox:smartinbox123@postgres:5432/smartinbox
      JWT_SECRET: supersecretkey123
    depends_on:
      - postgres
  email-fetcher:
    build: ./services/email-fetcher
    container_name: smartinbox-email-fetcher
    ports:
      - "8002:8002"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
  ai-classifier:
    build: ./services/ai-classifier
    container_name: smartinbox-ai-classifier
    ports:
      - "8003:8003"
    environment:
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://host.docker.internal:11434/api/generate
      OLLAMA_MODEL: tinyllama
    depends_on:
      - redis   
  action-engine:
    build: ./services/action-engine
    container_name: smartinbox-action-engine
    ports:
      - "8004:8004"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://smartinbox:smartinbox123@postgres:5432/smartinbox
    depends_on:
      - redis
      - postgres  
  notification-service:
    build: ./services/notification-service
    container_name: smartinbox-notification
    ports:
      - "8005:8005"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://smartinbox:smartinbox123@postgres:5432/smartinbox
      TELEGRAM_BOT_TOKEN: your_bot_token_here
    depends_on:
      - redis
      - postgres   
  scheduler:
    build: ./services/scheduler
    container_name: smartinbox-scheduler
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql://smartinbox:smartinbox123@postgres:5432/smartinbox
      EMAIL_FETCHER_URL: http://email-fetcher:8002
      FETCH_INTERVAL_MINUTES: 5
    depends_on:
      - postgres
      - email-fetcher 
  api-gateway:
    build: ./services/api-gateway
    container_name: smartinbox-api-gateway
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET: supersecretkey123
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8001
      EMAIL_FETCHER_URL: http://email-fetcher:8002
      AI_CLASSIFIER_URL: http://ai-classifier:8003
      ACTION_ENGINE_URL: http://action-engine:8004
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      SCHEDULER_URL: http://scheduler:8006
    depends_on:
      - auth-service
      - email-fetcher
      - ai-classifier
      - action-engine
      - notification-service
      - scheduler       
volumes:
  postgres_data: